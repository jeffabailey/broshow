<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BroShow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>BroShow</h1>
    <p id="status" class="status-text">Loading...</p>
    <fieldset id="mode-selector" class="mode-selector" data-testid="mode-selector">
      <legend class="mode-legend">Recording mode</legend>
      <label class="mode-option">
        <input type="radio" name="recording-mode" value="single-tab" checked>
        <span>Record this tab</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="recording-mode" value="window-cropped">
        <span>Record all tabs (window, cropped)</span>
      </label>
    </fieldset>
    <button id="action-button" disabled>Loading...</button>
    <p id="fallback-notice" data-testid="fallback-notice" class="fallback-notice" hidden></p>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
