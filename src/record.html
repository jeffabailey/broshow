<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BroShow Recorder</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body { padding: 16px; max-width: 480px; }
      button { font-size: 16px; padding: 12px 18px; cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.5; }
      #status { margin-top: 12px; min-height: 24px; }
      .hint { color: #666; font-size: 13px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h2>BroShow Recorder (Firefox)</h2>
    <p class="hint">
      Click below to pick the tab/window/screen to record. Keep this
      page open while recording. Click Stop here when you're done.
    </p>
    <button id="action-button">Pick &amp; Start Recording</button>
    <p id="status">Ready</p>
    <script type="module" src="record.js"></script>
  </body>
</html>
