<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Broshow logo">
  <title>Broshow</title>
  <desc>A browser window with a play triangle and a red recording dot.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="rec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bg)"/>

  <!-- inner browser window -->
  <rect x="40" y="56" width="176" height="144" rx="20" ry="20"
        fill="#FFFFFF" fill-opacity="0.10"
        stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3"/>

  <!-- browser title bar -->
  <path d="M40 76 a20 20 0 0 1 20 -20 h136 a20 20 0 0 1 20 20 v8 h-176 z"
        fill="#FFFFFF" fill-opacity="0.18"/>

  <!-- traffic-light dots -->
  <circle cx="58" cy="70" r="4" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="72" cy="70" r="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <circle cx="86" cy="70" r="4" fill="#FFFFFF" fill-opacity="0.55"/>

  <!-- play triangle (the "show") -->
  <path d="M112 102 L168 132 L112 162 Z"
        fill="#FFFFFF"
        stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round"/>

  <!-- recording dot (the "bro" stamp) -->
  <circle cx="186" cy="98" r="22" fill="url(#rec)" filter="url(#soft)"/>
  <circle cx="186" cy="98" r="18" fill="url(#rec)"/>
  <circle cx="180" cy="92" r="5" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
