name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0). Must already exist or will be created on the current commit.'
        required: true
      targets:
        description: 'Marketplace targets (comma-separated): cws,amo-listed | cws-only | amo-listed-only | none'
        required: false
        default: 'cws,amo-listed'
      mode:
        description: 'Publish mode: publish | upload-only | dry-run'
        required: false
        default: 'publish'

permissions:
  contents: write

# Prevent two parallel publish runs for the same tag from racing on the
# same marketplace listing.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./dist/manifest.json').version")
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match release tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Package Chrome zip
        run: |
          cd dist
          zip -r "../broshow-chrome-${{ steps.version.outputs.version }}.zip" .

      - name: Stage Firefox build
        run: |
          cp -r dist firefox-dist
          node scripts/patch-firefox-manifest.mjs firefox-dist/manifest.json

      - name: Lint Firefox build
        run: npx web-ext lint --source-dir firefox-dist --warnings-as-errors=false

      - name: Resolve next available AMO version (auto-bumps if tag version is taken)
        id: amo-version
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "amo_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
            echo "AMO credentials missing; using tag version verbatim ($TAG_VERSION)"
            exit 0
          fi
          RESOLVED=$(node scripts/find-next-amo-version.mjs "$TAG_VERSION")
          echo "amo_version=$RESOLVED" >> "$GITHUB_OUTPUT"
          if [ "$RESOLVED" != "$TAG_VERSION" ]; then
            echo "::warning::Tag version $TAG_VERSION is already on AMO. Auto-bumped Firefox xpi to $RESOLVED."
          else
            echo "Tag version $TAG_VERSION is available on AMO."
          fi

      - name: Bump Firefox manifest version to resolved AMO version
        if: steps.amo-version.outputs.amo_version != steps.version.outputs.version
        run: |
          node -e "
            const fs = require('fs');
            const path = 'firefox-dist/manifest.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            m.version = '${{ steps.amo-version.outputs.amo_version }}';
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
          "

      - name: Package Firefox xpi (signed via AMO if credentials are set, else unsigned)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          XPI_OUTPUT: broshow-firefox-${{ steps.amo-version.outputs.amo_version }}.xpi
        run: |
          if [ -n "$AMO_JWT_ISSUER" ] && [ -n "$AMO_JWT_SECRET" ]; then
            echo "Signing xpi via AMO (unlisted channel) as version ${{ steps.amo-version.outputs.amo_version }}..."
            mkdir -p signed
            npx web-ext sign \
              --source-dir firefox-dist \
              --artifacts-dir signed \
              --channel unlisted \
              --api-key "$AMO_JWT_ISSUER" \
              --api-secret "$AMO_JWT_SECRET"
            mv signed/*.xpi "$XPI_OUTPUT"
            echo "Signed xpi: $XPI_OUTPUT"
          else
            echo "::warning::AMO_JWT_ISSUER / AMO_JWT_SECRET not set; producing UNSIGNED xpi."
            echo "::warning::Stock Firefox will refuse to install it. Set the secrets to enable signing."
            cd firefox-dist
            zip -r "../$XPI_OUTPUT" .
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            broshow-chrome-${{ steps.version.outputs.version }}.zip
            broshow-firefox-${{ steps.amo-version.outputs.amo_version }}.xpi

      - name: Upload publish artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: publish-artifacts
          path: |
            broshow-chrome-${{ steps.version.outputs.version }}.zip
            broshow-firefox-${{ steps.amo-version.outputs.amo_version }}.xpi
          retention-days: 7

  # Marketplace publish job. Environment-gated by `marketplace-prod` so that
  # publishing requires an explicit reviewer approval click distinct from the
  # tag push. Honors the project memory rule: tag push alone never publishes;
  # only an explicit workflow_dispatch with reviewer approval does.
  publish:
    needs: release
    if: github.event_name == 'workflow_dispatch' && inputs.mode != 'dry-run' && inputs.targets != 'none'
    runs-on: ubuntu-latest
    environment: marketplace-prod
    strategy:
      fail-fast: false
      matrix:
        target: [cws, amo-listed]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Skip if target not in inputs.targets
        id: filter
        run: |
          TARGETS="${{ inputs.targets }}"
          TARGET="${{ matrix.target }}"
          case "$TARGETS" in
            *"$TARGET"*) echo "run=true" >> "$GITHUB_OUTPUT" ;;
            "cws-only") [ "$TARGET" = "cws" ] && echo "run=true" >> "$GITHUB_OUTPUT" || echo "run=false" >> "$GITHUB_OUTPUT" ;;
            "amo-listed-only") [ "$TARGET" = "amo-listed" ] && echo "run=true" >> "$GITHUB_OUTPUT" || echo "run=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "run=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Download publish artifacts
        if: steps.filter.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: publish-artifacts
          path: ./publish-artifacts

      - name: Run publish orchestrator (${{ matrix.target }})
        if: steps.filter.outputs.run == 'true'
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          TAG: ${{ inputs.tag }}
          TARGETS: ${{ matrix.target }}
          MODE: ${{ inputs.mode }}
          ARTIFACT_DIR: ./publish-artifacts
        run: node scripts/publish-orchestrator.effect.mjs

  # Dry-run is a read-only verification path. Skips the environment gate
  # because no external state is mutated -- only API probes for token
  # validity, version-conflict detection, and quota checks.
  publish-dry-run:
    needs: release
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' && inputs.targets != 'none'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [cws, amo-listed]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dry-run orchestrator (${{ matrix.target }})
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          TAG: ${{ inputs.tag }}
          TARGETS: ${{ matrix.target }}
          MODE: dry-run
        run: node scripts/publish-orchestrator.effect.mjs

  # End-of-run aggregation. Runs even on partial failure so that maintainer
  # always sees a per-target outcome table in the GitHub Actions step summary.
  aggregate-summary:
    needs: [release, publish, publish-dry-run]
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Render aggregate summary
        run: |
          {
            echo "# Marketplace Publish Summary"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"
            echo "| chrome-web-store | ${{ needs.publish.result }}${{ needs.publish-dry-run.result }} |"
            echo "| amo-listed | ${{ needs.publish.result }}${{ needs.publish-dry-run.result }} |"
            echo ""
            echo "Mode: ${{ inputs.mode }}"
            echo "Tag: ${{ inputs.tag }}"
            echo "Targets: ${{ inputs.targets }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any publish target failed
        if: needs.publish.result == 'failure' || needs.publish-dry-run.result == 'failure'
        run: |
          echo "::error::At least one marketplace publish target failed. See per-job logs."
          exit 1
